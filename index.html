<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LLM Playground</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #161616;
    --border:   #2a2a2a;
    --accent:   #7c3aed;
    --accent2:  #a78bfa;
    --green:    #34d399;
    --red:      #f87171;
    --yellow:   #fbbf24;
    --text:     #e5e5e5;
    --muted:    #6b6b6b;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Inter', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: grid;
    grid-template-rows: 48px 1fr;
    overflow: hidden;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
    letter-spacing: 1px;
  }

  .header-actions {
    margin-left: auto;
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(124, 58, 237, 0.15);
    color: var(--accent2);
    border: 1px solid rgba(124, 58, 237, 0.3);
  }

  .main {
    display: grid;
    grid-template-columns: 280px 1fr 320px;
    overflow: hidden;
  }

  /* SIDEBAR */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .form-group { margin-bottom: 12px; }

  .form-group label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 5px;
  }

  select, input[type="text"], input[type="password"] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 10px;
    color: var(--text);
    font-size: 12px;
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus, input:focus { border-color: var(--accent); }

  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
    cursor: pointer;
  }

  .range-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .range-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent2);
    min-width: 32px;
    text-align: right;
  }

  .history-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .history-item {
    padding: 8px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid transparent;
    margin-bottom: 4px;
    transition: all 0.15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .history-item:hover { background: var(--bg); border-color: var(--border); color: var(--text); }

  .history-item.active { background: rgba(124,58,237,0.1); border-color: var(--accent); color: var(--accent2); }

  .clear-btn {
    margin: 8px;
    padding: 6px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    width: calc(100% - 16px);
  }

  .clear-btn:hover { border-color: var(--red); color: var(--red); }

  /* EDITOR */
  .editor-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .editor-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    padding: 0 16px;
  }

  .tab {
    padding: 10px 16px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    user-select: none;
  }

  .tab:hover  { color: var(--text); }
  .tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

  .tab-content { display: none; flex: 1; overflow: hidden; flex-direction: column; }
  .tab-content.active { display: flex; }

  .system-wrap {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(124,58,237,0.04);
  }

  .system-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 12px;
    font-family: var(--mono);
    resize: none;
    outline: none;
    line-height: 1.6;
  }

  .prompt-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .prompt-area {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
  }

  #promptInput {
    width: 100%;
    height: 100%;
    min-height: 120px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 14px;
    font-family: var(--sans);
    resize: none;
    outline: none;
    line-height: 1.7;
  }

  .prompt-actions {
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .run-btn {
    padding: 8px 20px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
  }

  .run-btn:hover   { background: #6d28d9; }
  .run-btn:active  { transform: scale(0.98); }
  .run-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .save-btn {
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: var(--sans);
  }

  .save-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .token-hint {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }

  /* COMPARE TAB */
  .compare-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .compare-cell {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .compare-header {
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .compare-header select {
    flex: 1;
    font-size: 11px;
    padding: 4px 8px;
  }

  .compare-output {
    flex: 1;
    padding: 14px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.7;
    color: var(--muted);
    font-family: var(--mono);
    white-space: pre-wrap;
  }

  .compare-actions {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 8px;
  }

  .compare-run-btn {
    flex: 1;
    padding: 7px;
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: background 0.15s;
  }

  .compare-run-btn:hover { background: #6d28d9; }

  /* OUTPUT PANEL */
  .output-panel {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .output-header {
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--muted);
  }

  .status-dot.running { background: var(--yellow); animation: pulse 1s infinite; }
  .status-dot.success { background: var(--green); }
  .status-dot.error   { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
  }

  .output-content {
    flex: 1;
    padding: 16px;
    overflow-y: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .output-placeholder {
    color: var(--muted);
    font-style: italic;
    font-family: var(--sans);
    font-size: 13px;
  }

  .metrics-bar {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .metric {
    text-align: center;
  }

  .metric-val {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent2);
  }

  .metric-label {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  .history-panel {
    border-top: 1px solid var(--border);
    max-height: 180px;
    overflow-y: auto;
    padding: 8px;
  }

  .history-entry {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    margin-bottom: 6px;
    cursor: pointer;
    transition: border-color 0.15s;
  }

  .history-entry:hover { border-color: var(--accent); }

  .history-entry-prompt {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .history-entry-meta {
    display: flex;
    gap: 8px;
    font-size: 10px;
    font-family: var(--mono);
  }

  .meta-tokens { color: var(--yellow); }
  .meta-cost   { color: var(--green); }
  .meta-ms     { color: var(--accent2); }

  ::-webkit-scrollbar       { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <span class="logo">⚡ LLM PLAYGROUND</span>
  <span class="badge">zero deps</span>
  <div class="header-actions">
    <span id="apiStatus" class="badge" style="background:rgba(107,107,107,0.15);color:var(--muted);border-color:#333">no key</span>
  </div>
</header>

<div class="main">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">API Key</div>
      <div class="form-group">
        <input type="password" id="apiKey" placeholder="sk-...">
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Model</div>
      <div class="form-group">
        <select id="model">
          <option value="gpt-4o-mini">gpt-4o-mini</option>
          <option value="gpt-4o">gpt-4o</option>
          <option value="gpt-4-turbo">gpt-4-turbo</option>
          <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
        </select>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Parameters</div>
      <div class="form-group">
        <label>Temperature</label>
        <div class="range-row">
          <input type="range" id="temperature" min="0" max="2" step="0.1" value="0.7">
          <span class="range-val" id="tempVal">0.7</span>
        </div>
      </div>
      <div class="form-group">
        <label>Max Tokens</label>
        <div class="range-row">
          <input type="range" id="maxTokens" min="100" max="4000" step="100" value="1000">
          <span class="range-val" id="tokensVal">1000</span>
        </div>
      </div>
    </div>

    <div class="sidebar-label" style="padding:12px 16px 4px">History</div>
    <div class="history-list" id="historyList"></div>
    <button class="clear-btn" id="clearHistory">Clear history</button>
  </div>

  <!-- EDITOR -->
  <div class="editor-panel">
    <div class="editor-tabs">
      <div class="tab active" data-tab="prompt">Prompt</div>
      <div class="tab"        data-tab="compare">Compare</div>
    </div>

    <!-- PROMPT TAB -->
    <div class="tab-content active" id="tab-prompt">
      <div class="system-wrap">
        <div class="system-label">System</div>
        <textarea id="systemPrompt" rows="2" placeholder="You are a helpful assistant...">You are a helpful, concise assistant.</textarea>
      </div>
      <div class="prompt-wrap">
        <div class="prompt-area">
          <textarea id="promptInput" placeholder="Enter your prompt here...&#10;&#10;Tip: Use Ctrl+Enter to run"></textarea>
        </div>
        <div class="prompt-actions">
          <button class="run-btn" id="runBtn">▶ Run</button>
          <button class="save-btn" id="saveBtn">💾 Save</button>
          <span class="token-hint" id="tokenHint">~0 tokens</span>
        </div>
      </div>
    </div>

    <!-- COMPARE TAB -->
    <div class="tab-content" id="tab-compare">
      <div class="compare-grid">
        <div class="compare-cell">
          <div class="compare-header">
            <select id="compareModel1">
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-4o">gpt-4o</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
          </div>
          <div class="compare-output" id="compareOut1"><span style="color:var(--muted);font-family:var(--sans);font-style:italic">Output will appear here...</span></div>
          <div class="compare-actions">
            <button class="compare-run-btn" id="compareRun1">▶ Run</button>
          </div>
        </div>
        <div class="compare-cell">
          <div class="compare-header">
            <select id="compareModel2">
              <option value="gpt-4o">gpt-4o</option>
              <option value="gpt-4o-mini">gpt-4o-mini</option>
              <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
            </select>
          </div>
          <div class="compare-output" id="compareOut2"><span style="color:var(--muted);font-family:var(--sans);font-style:italic">Output will appear here...</span></div>
          <div class="compare-actions">
            <button class="compare-run-btn" id="compareRun2">▶ Run</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- OUTPUT -->
  <div class="output-panel">
    <div class="output-header">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">ready</span>
    </div>

    <div class="output-content" id="outputContent">
      <span class="output-placeholder">Run a prompt to see the response here.</span>
    </div>

    <div class="metrics-bar">
      <div class="metric">
        <div class="metric-val" id="metricTokens">—</div>
        <div class="metric-label">tokens</div>
      </div>
      <div class="metric">
        <div class="metric-val" id="metricCost">—</div>
        <div class="metric-label">cost</div>
      </div>
      <div class="metric">
        <div class="metric-val" id="metricMs">—</div>
        <div class="metric-label">latency</div>
      </div>
    </div>

    <div class="history-panel" id="runHistory"></div>
  </div>

</div>

<script>
const PRICING = {
  "gpt-4o":         5.00,
  "gpt-4o-mini":    0.15,
  "gpt-4-turbo":    10.00,
  "gpt-3.5-turbo":  0.50,
}

function estimateCost(model, tokens) {
  const rate = PRICING[model] ?? 1.00
  return (tokens / 1000) * rate
}

function estimateTokens(text) {
  return Math.ceil((text || "").length / 4)
}

const $ = id => document.getElementById(id)

const state = {
  history: JSON.parse(localStorage.getItem("llm_history") || "[]"),
  running: false,
}

function saveHistory() {
  localStorage.setItem("llm_history", JSON.stringify(state.history.slice(-50)))
}

function renderSidebarHistory() {
  const list = $("historyList")
  list.innerHTML = ""
  ;[...state.history].reverse().forEach((entry, i) => {
    const div = document.createElement("div")
    div.className = "history-item"
    div.textContent = entry.prompt.slice(0, 60)
    div.onclick = () => {
      $("promptInput").value  = entry.prompt
      $("systemPrompt").value = entry.system || ""
      updateTokenHint()
    }
    list.appendChild(div)
  })
}

function renderRunHistory() {
  const panel = $("runHistory")
  panel.innerHTML = ""
  ;[...state.history].reverse().slice(0, 6).forEach(entry => {
    const div = document.createElement("div")
    div.className = "history-entry"
    div.innerHTML = `
      <div class="history-entry-prompt">${entry.prompt.slice(0, 60)}...</div>
      <div class="history-entry-meta">
        <span class="meta-tokens">${entry.tokens} tok</span>
        <span class="meta-cost">$${entry.cost.toFixed(5)}</span>
        <span class="meta-ms">${entry.ms}ms</span>
      </div>
    `
    div.onclick = () => {
      $("outputContent").textContent = entry.response
      $("metricTokens").textContent  = entry.tokens
      $("metricCost").textContent    = `$${entry.cost.toFixed(5)}`
      $("metricMs").textContent      = `${entry.ms}ms`
    }
    panel.appendChild(div)
  })
}

function setStatus(type, text) {
  const dot  = $("statusDot")
  const span = $("statusText")
  dot.className  = `status-dot ${type}`
  span.textContent = text
}

function updateTokenHint() {
  const prompt = $("promptInput").value
  const system = $("systemPrompt").value
  const tokens = estimateTokens(prompt) + estimateTokens(system)
  $("tokenHint").textContent = `~${tokens} tokens`
}

async function callOpenAI(model, system, prompt, maxTokens, temperature) {
  const apiKey = $("apiKey").value.trim()
  if (!apiKey) throw new Error("API key is required")

  const response = await fetch("https://api.openai.com/v1/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type":  "application/json",
      "Authorization": `Bearer ${apiKey}`,
    },
    body: JSON.stringify({
      model,
      max_tokens:  maxTokens,
      temperature,
      messages: [
        { role: "system", content: system },
        { role: "user",   content: prompt },
      ],
    }),
  })

  if (!response.ok) {
    const err = await response.json().catch(() => ({}))
    throw new Error(err.error?.message || `HTTP ${response.status}`)
  }

  return response.json()
}

async function runPrompt() {
  if (state.running) return

  const prompt      = $("promptInput").value.trim()
  const system      = $("systemPrompt").value.trim()
  const model       = $("model").value
  const maxTokens   = parseInt($("maxTokens").value)
  const temperature = parseFloat($("temperature").value)

  if (!prompt) return

  state.running = true
  $("runBtn").disabled = true
  $("runBtn").innerHTML = '<span class="spinner"></span>Running...'
  setStatus("running", "running...")
  $("outputContent").innerHTML = '<span class="output-placeholder">Waiting for response...</span>'

  const start = Date.now()

  try {
    const data    = await callOpenAI(model, system, prompt, maxTokens, temperature)
    const ms      = Date.now() - start
    const content = data.choices?.[0]?.message?.content ?? ""
    const tokens  = data.usage?.total_tokens ?? 0
    const cost    = estimateCost(model, tokens)

    $("outputContent").textContent = content
    $("metricTokens").textContent  = tokens
    $("metricCost").textContent    = `$${cost.toFixed(5)}`
    $("metricMs").textContent      = `${ms}ms`
    setStatus("success", `done — ${ms}ms`)

    const entry = { prompt, system, model, response: content, tokens, cost, ms, ts: Date.now() }
    state.history.push(entry)
    saveHistory()
    renderSidebarHistory()
    renderRunHistory()

  } catch (err) {
    setStatus("error", err.message)
    $("outputContent").innerHTML = `<span style="color:var(--red)">${err.message}</span>`
  } finally {
    state.running        = false
    $("runBtn").disabled = false
    $("runBtn").innerHTML = "▶ Run"
  }
}

async function runCompare(slot) {
  const prompt      = $("promptInput").value.trim()
  const system      = $("systemPrompt").value.trim()
  const model       = $(`compareModel${slot}`).value
  const maxTokens   = parseInt($("maxTokens").value)
  const temperature = parseFloat($("temperature").value)
  const outEl       = $(`compareOut${slot}`)
  const btnEl       = $(`compareRun${slot}`)

  if (!prompt) { outEl.textContent = "Enter a prompt first."; return }

  btnEl.disabled       = true
  btnEl.textContent    = "Running..."
  outEl.textContent    = "..."

  try {
    const start = Date.now()
    const data  = await callOpenAI(model, system, prompt, maxTokens, temperature)
    const ms    = Date.now() - start
    const text  = data.choices?.[0]?.message?.content ?? ""
    const toks  = data.usage?.total_tokens ?? 0

    outEl.textContent = `${text}\n\n─── ${toks} tokens · ${ms}ms ───`
  } catch (err) {
    outEl.innerHTML = `<span style="color:var(--red)">${err.message}</span>`
  } finally {
    btnEl.disabled  = false
    btnEl.textContent = "▶ Run"
  }
}

$("runBtn").addEventListener("click", runPrompt)

$("saveBtn").addEventListener("click", () => {
  const prompt = $("promptInput").value.trim()
  if (!prompt) return
  const key = `saved_${Date.now()}`
  localStorage.setItem(key, JSON.stringify({ prompt, system: $("systemPrompt").value }))
  $("saveBtn").textContent = "✓ Saved"
  setTimeout(() => { $("saveBtn").textContent = "💾 Save" }, 1500)
})

$("clearHistory").addEventListener("click", () => {
  state.history = []
  saveHistory()
  renderSidebarHistory()
  renderRunHistory()
})

$("compareRun1").addEventListener("click", () => runCompare(1))
$("compareRun2").addEventListener("click", () => runCompare(2))

$("promptInput").addEventListener("input", updateTokenHint)
$("systemPrompt").addEventListener("input", updateTokenHint)

$("promptInput").addEventListener("keydown", e => {
  if (e.ctrlKey && e.key === "Enter") runPrompt()
})

$("temperature").addEventListener("input", e => { $("tempVal").textContent   = e.target.value })
$("maxTokens").addEventListener("input",   e => { $("tokensVal").textContent = e.target.value })

$("apiKey").addEventListener("input", e => {
  const val    = e.target.value.trim()
  const status = $("apiStatus")
  if (val.startsWith("sk-") && val.length > 20) {
    status.textContent  = "key set"
    status.style.color  = "var(--green)"
    status.style.background = "rgba(52,211,153,0.1)"
    status.style.borderColor = "rgba(52,211,153,0.3)"
  } else {
    status.textContent  = "no key"
    status.style.color  = "var(--muted)"
    status.style.background = "rgba(107,107,107,0.15)"
    status.style.borderColor = "#333"
  }
})

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"))
    document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"))
    tab.classList.add("active")
    $(`tab-${tab.dataset.tab}`).classList.add("active")
  })
})

renderSidebarHistory()
renderRunHistory()
updateTokenHint()
</script>
</body>
</html>
